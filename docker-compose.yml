version: "3.9"

services:
  server:
    build: ./server
    container_name: go-server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    restart: always

  client:
    build: ./client
    container_name: vite-client
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: always